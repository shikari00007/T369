services:
  postgres:
    image: postgres:16-alpine
    container_name: t369_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-t369}
      POSTGRES_USER: ${POSTGRES_USER:-t369}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_securely}
      TZ: ${TZ:-UTC}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-t369} -d ${POSTGRES_DB:-t369}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - t369_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: t369_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8080}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-t369}
      POSTGRES_USER: ${POSTGRES_USER:-t369}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_securely}
      TZ: ${TZ:-UTC}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - t369_net

networks:
  t369_net:
    driver: bridge

volumes:
  pgdata:
